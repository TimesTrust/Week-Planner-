<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <p class="eyebrow">Plan Ahead</p>
      <h1>Weekly Planner</h1>
      <p id="weekRange" class="week-range" aria-live="polite"></p>
    </header>

    <section class="planner-grid-wrapper" aria-label="Weekly planner layout">
      <div id="plannerGrid" class="planner-grid"></div>
    </section>

    <footer class="planner-nav">
      <button id="prevWeekBtn" class="nav-btn" type="button">Previous Week</button>
      <button id="nextWeekBtn" class="nav-btn" type="button">Next Week</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
